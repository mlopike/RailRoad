<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поезда - Админ-панель</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <div class="container">
            <h1>🚂 Железнодорожная касса</h1>
            <nav>
                <span sec:authentication="name"></span>
                <a th:href="@{/admin}">Главная</a>
                <a th:href="@{/admin/trains}">Поезда</a>
                <a th:href="@{/admin/stations}">Станции</a>
                <a th:href="@{/admin/users}">Пользователи</a>
                <a th:href="@{/admin/bookings}">Заявки</a>
                <a th:href="@{/profile}">Профиль</a>
                <form th:action="@{/auth/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn-logout">Выход</button>
                </form>
            </nav>
        </div>
    </header>

    <main class="container">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="card">
            <h2>Управление поездами</h2>
            <a th:href="@{/admin/trains/new}" class="btn btn-primary">Добавить поезд</a>
            
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Номер поезда</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="train : ${trains}">
                        <td th:text="${train.id}">1</td>
                        <td th:text="${train.trainNumber}">001</td>
                        <td>
                            <a th:href="@{/admin/trains/{id}(id=${train.id})}" class="btn btn-secondary">Маршрут</a>
                            <form th:action="@{/admin/trains/delete/{id}(id=${train.id})}" method="post" style="display:inline;"
                                  onsubmit="return confirm('Удалить поезд?')">
                                <button type="submit" class="btn btn-danger">Удалить</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(trains)}">
                        <td colspan="3" style="text-align:center;">Поездов пока нет</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Система железнодорожная касса</p>
    </footer>
</body>
</html>
