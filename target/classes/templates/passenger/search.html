<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск рейсов - Железнодорожная касса</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <div class="container">
            <h1>🚂 Железнодорожная касса</h1>
            <nav>
                <span sec:authentication="name"></span>
                <a th:href="@{/passenger}">Поиск рейсов</a>
                <a th:href="@{/passenger/bookings}">Мои заявки</a>
                <a th:href="@{/profile}">Профиль</a>
                <form th:action="@{/auth/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn-logout">Выход</button>
                </form>
                <a th:href="@{/admin}" sec:authorize="hasRole('ADMIN')">Админ-панель</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="card" style="max-width: 600px; margin: 50px auto;">
            <h2>Поиск железнодорожных рейсов</h2>
            
            <form th:action="@{/passenger/search}" method="post">
                <div class="form-group">
                    <label for="fromStation">Станция отправления:</label>
                    <select id="fromStation" name="fromStationId" required>
                        <option value="">Выберите станцию</option>
                        <option th:each="station : ${stations}"
                                th:value="${station.id}"
                                th:text="${station.name}">Москва</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="toStation">Станция назначения:</label>
                    <select id="toStation" name="toStationId" required>
                        <option value="">Выберите станцию</option>
                        <option th:each="station : ${stations}"
                                th:value="${station.id}"
                                th:text="${station.name}">Санкт-Петербург</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Найти рейсы</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Система железнодорожная касса</p>
    </footer>
</body>
</html>
