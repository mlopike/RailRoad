<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить пользователя - Админ-панель</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <div class="container">
            <h1>🚂 Железнодорожная касса</h1>
            <nav>
                <span sec:authentication="name"></span>
                <a th:href="@{/admin}">Главная</a>
                <a th:href="@{/admin/trains}">Поезда</a>
                <a th:href="@{/admin/stations}">Станции</a>
                <a th:href="@{/admin/users}">Пользователи</a>
                <a th:href="@{/admin/bookings}">Заявки</a>
                <a th:href="@{/profile}">Профиль</a>
                <form th:action="@{/auth/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn-logout">Выход</button>
                </form>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <h2>Добавить нового пользователя</h2>
            <form th:action="@{/admin/users}" th:object="${userDto}" method="post">
                <div class="grid-2">
                    <div class="form-group">
                        <label for="username">Имя пользователя:</label>
                        <input type="text" id="username" th:field="*{username}" 
                               placeholder="Придумайте имя пользователя" required>
                        <small th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color: #dc3545;"></small>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" th:field="*{email}" 
                               placeholder="example@mail.ru" required>
                        <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: #dc3545;"></small>
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль:</label>
                        <input type="password" id="password" th:field="*{password}" 
                               placeholder="Придумайте пароль" required>
                        <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: #dc3545;"></small>
                    </div>
                    <div class="form-group">
                        <label for="role">Роль:</label>
                        <select id="role" th:field="*{role}" required>
                            <option value="USER">Пользователь (Пассажир)</option>
                            <option value="ADMIN">Администратор</option>
                        </select>
                    </div>
                </div>
                <div class="actions">
                    <button type="submit" class="btn btn-success">Создать пользователя</button>
                    <a th:href="@{/admin/users}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Система железнодорожная касса</p>
    </footer>
</body>
</html>
