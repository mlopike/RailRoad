<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Станции - Админ-панель</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <div class="container">
            <h1>🚂 Железнодорожная касса</h1>
            <nav>
                <span sec:authentication="name"></span>
                <a th:href="@{/admin}">Главная</a>
                <a th:href="@{/admin/trains}">Поезда</a>
                <a th:href="@{/admin/stations}">Станции</a>
                <a th:href="@{/admin/users}">Пользователи</a>
                <a th:href="@{/admin/bookings}">Заявки</a>
                <a th:href="@{/profile}">Профиль</a>
                <form th:action="@{/auth/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn-logout">Выход</button>
                </form>
            </nav>
        </div>
    </header>

    <main class="container">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="card">
            <h2>Управление станциями</h2>
            
            <form th:action="@{/admin/stations}" method="post" style="margin-bottom: 20px;">
                <div class="form-group" style="display: flex; gap: 10px; align-items: flex-end;">
                    <div style="flex: 1;">
                        <label for="name">Название станции:</label>
                        <input type="text" id="name" name="name" placeholder="Например: Москва" required>
                    </div>
                    <button type="submit" class="btn btn-success">Добавить станцию</button>
                </div>
            </form>
            
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="station : ${stations}">
                        <td th:text="${station.id}">1</td>
                        <td th:text="${station.name}">Москва</td>
                        <td>
                            <form th:action="@{/admin/stations/delete/{id}(id=${station.id})}" method="post"
                                  style="display:inline;" onsubmit="return confirm('Удалить станцию?')">
                                <button type="submit" class="btn btn-danger">Удалить</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(stations)}">
                        <td colspan="3" style="text-align:center;">Станций пока нет</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Система железнодорожная касса</p>
    </footer>
</body>
</html>
